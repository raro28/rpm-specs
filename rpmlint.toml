# rpmlint configuration for this repo (additive to Fedora's defaults).
#
#   rpmlint -c rpmlint.toml */*.spec
#
# no-%check-section: deliberately suppressed, not fixed. The vinceliuice GTK/icon
# themes and the kvmfr akmod have no upstream test suite and nothing meaningful to
# assert at build time. Suppressing this informational warning is more honest than
# shipping a no-op "%check\n:" section that tests nothing. Real defects
# (setup-not-quiet, macro-in-%changelog, no-%build-section) were fixed in the specs.
#
# spelling-error json/ekthor: false positives in the per-monitor-wallpaper
# extension description -- "json" is part of config.json and "ekthor" is the
# author tag in the extension UUID. Both are correct, not misspellings.
#
# explicit-lib-dependency (mural): mural is a noarch GJS app -- it links nothing,
# so RPM generates no automatic dependencies. Its runtime GObject-Introspection
# deps (libadwaita -> Adw typelib; glycin-libs/glycin-gtk4-libs -> Gly/GlyGtk4
# typelibs, loaded by name at runtime) must therefore be explicit, and none of
# these packages expose a typelib() provide to depend on instead. The check is a
# false positive here.
#
# spelling-error cli/ggml/vulkan/rocm/...: false positives -- the llama-cli tool
# name plus the backend/GPU technical terms in llama.cpp's %description(s)
# (ggml, libggml, vulkan, rocm, rocBLAS, hipBLAS, Radeon). All correct spellings.
#
# spelling-error nana/materia: false positives -- orchis-gtk-theme's
# %description credits the upstream projects it is based on (nana-4,
# materia-theme). Proper nouns, not misspellings.
#
# invalid-soname (llama.cpp): upstream's unified-binary private impl libs
# (libllama-*-impl.so) are runtime-NEEDED regular files that carry no SONAME, and
# the launchers reach them with no RPATH, so they can't be versioned or relocated.
# Not public ABI.
#
# no-manual-page (llama.cpp): upstream ships no man pages for its 40+ llama-* tools
# or the dlopen backend libs (libggml-*.so); authoring them is impractical. Scoped
# by binary-name prefix so it does not suppress the check repo-wide.
#
# no-documentation (llama.cpp-vulkan/-rocm): the GPU backend subpackages ship a
# single dlopen module (libggml-vulkan.so / libggml-hip.so) and Require the base
# package, where README/LICENSE live. No own docs by design. Scoped to those two.
#
# no-documentation (colloid|fluent|orchis|qogir|whitesur -gtk|icon-theme): theme
# color/size subpackages ship %license only, by design -- no README/docs beyond
# the license. rpmlint's documentation check doesn't accept %license as
# satisfying it. Scoped to the vinceliuice theme family.
#
# dangling-relative-symlink (whitesur-icon-theme, the -light/-dark variants):
# same false positive as qogir-icon below. All 30 flagged links were resolved on
# disk from the reassembled package tree -- every one resolves; find -xtype l over
# the same tree reports 0 broken. The %check gate independently asserts 0 dangling
# symlinks in the buildroot, so a genuine break would still fail the build.
#
# dangling-relative-symlink (qogir-icon-theme, Qogir-Light/Qogir-Dark): false
# positive. install.sh aliases whole subdirectories via directory symlinks (e.g.
# Qogir-Light/16/actions -> ../../Qogir/16/actions), and real files in sibling
# dirs (panel/) reference them with one relative hop (../actions/foo.svg).
# rpmlint's checker doesn't resolve through the intermediate directory symlink;
# every flagged path was verified to resolve (readlink -f + test -e) against the
# extracted built RPM. Scoped to qogir-icon-theme's Light/Dark aliasing only.
Filters = [
    "no-%check-section",
    "spelling-error.*'(json|ekthor|cli|ggml|libggml|vulkan|rocm|rocBLAS|hipBLAS|Radeon|nana|materia)'",
    "explicit-lib-dependency (libadwaita|glycin-libs|glycin-gtk4-libs)",
    "invalid-soname .*libllama-.*-impl\\.so",
    "no-manual-page-for-binary (llama|libggml-)",
    "llama\\.cpp-(vulkan|rocm).*no-documentation",
    "(colloid|fluent|orchis|qogir|whitesur)-(gtk|icon)-theme.*no-documentation",
    "qogir-icon-theme.*dangling-relative-symlink /usr/share/icons/Qogir-(Light|Dark)/",
    "whitesur-icon-theme.*dangling-relative-symlink /usr/share/icons/WhiteSur-(red-|grey-)?(light|dark)/",
]
