# rpmlint configuration for this repo (additive to Fedora's defaults).
#
#   rpmlint -c rpmlint.toml */*.spec
#
# no-%check-section: deliberately suppressed, not fixed. The vinceliuice GTK/icon
# themes and the kvmfr akmod have no upstream test suite and nothing meaningful to
# assert at build time. Suppressing this informational warning is more honest than
# shipping a no-op "%check\n:" section that tests nothing. Real defects
# (setup-not-quiet, macro-in-%changelog, no-%build-section) were fixed in the specs.
#
# spelling-error json/ekthor: false positives in the per-monitor-wallpaper
# extension description -- "json" is part of config.json and "ekthor" is the
# author tag in the extension UUID. Both are correct, not misspellings.
#
# explicit-lib-dependency (mural): mural is a noarch GJS app -- it links nothing,
# so RPM generates no automatic dependencies. Its runtime GObject-Introspection
# deps (libadwaita -> Adw typelib; glycin-libs/glycin-gtk4-libs -> Gly/GlyGtk4
# typelibs, loaded by name at runtime) must therefore be explicit, and none of
# these packages expose a typelib() provide to depend on instead. The check is a
# false positive here.
#
# spelling-error cli: false positive -- the llama-cli tool name in llama.cpp's
# %description (rpmlint wants "CLI").
#
# invalid-soname (llama.cpp): upstream's unified-binary private impl libs
# (libllama-*-impl.so) are runtime-NEEDED regular files that carry no SONAME, and
# the launchers reach them with no RPATH, so they can't be versioned or relocated.
# Not public ABI.
#
# no-manual-page (llama.cpp): upstream ships no man pages for its 40+ llama-* tools
# or the dlopen backend libs (libggml-*.so); authoring them is impractical. Scoped
# by binary-name prefix so it does not suppress the check repo-wide.
Filters = [
    "no-%check-section",
    "spelling-error.*'(json|ekthor|cli)'",
    "explicit-lib-dependency (libadwaita|glycin-libs|glycin-gtk4-libs)",
    "invalid-soname .*libllama-.*-impl\\.so",
    "no-manual-page-for-binary (llama|libggml-)",
]
